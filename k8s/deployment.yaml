apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-list
  namespace: kubernetes-cluster
  labels:
    app: todo-list
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-list
  template:
    metadata:
      labels:
        app: todo-list
    spec:
      containers:
      - name: todo-list
        image: ahmed63/todo-list:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 80